<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="output.css" />
    <title>Login</title>
  </head>
  <body>
    <div
      class="min-h-screen bg-gray-50 flex items-center justify-center antialiased font-sans p-4"
    >
      <div
        class="w-full max-w-sm bg-white border border-gray-200 rounded-xl p-6 shadow-sm"
      >
        <!-- App Header Branding -->
        <div class="flex items-center gap-2 mb-6 justify-center">
          <div
            class="w-7 h-7 bg-black rounded flex items-center justify-center text-white font-bold text-sm"
          >
            A
          </div>
          <span class="font-bold text-gray-900 tracking-tight">AuthShield</span>
        </div>

        <div class="space-y-1 mb-6 text-center">
          <h1 class="text-xl font-bold tracking-tight text-gray-900">
            Welcome back
          </h1>
          <p class="text-xs text-gray-500">
            Sign in to access your secure dashboard workspace.
          </p>
        </div>

        <form action="" onsubmit="return false;">
          <div class="space-y-4">
            <div>
              <label
                for="emailAddress"
                class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1.5"
              >
                Email Address
              </label>
              <input
                type="email"
                id="emailAddress"
                placeholder="name@company.com"
                required
                class="w-full px-3 py-2 border border-gray-200 rounded text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-1 focus:ring-black focus:border-black transition"
              />
            </div>

            <div>
              <div class="flex items-center justify-between mb-1.5">
                <label
                  for="password"
                  class="block text-xs font-semibold uppercase tracking-wider text-gray-400"
                >
                  Password
                </label>
                <a
                  href="#"
                  class="text-[11px] text-gray-400 hover:text-black font-medium transition"
                >
                  Forgot?
                </a>
              </div>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
                class="w-full px-3 py-2 border border-gray-200 rounded text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-1 focus:ring-black focus:border-black transition"
              />
            </div>

            <div class="pt-2">
              <button
                type="submit"
                class="w-full bg-black text-white hover:bg-gray-800 text-sm font-semibold py-2.5 px-4 rounded transition-all tracking-tight"
              >
                Sign In
              </button>
            </div>
          </div>
        </form>

        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
          <p class="text-xs text-gray-500">
            Don't have an account?
            <a
              href="register.html"
              class="text-black font-semibold hover:underline"
              >Register</a
            >
          </p>
        </div>
      </div>
    </div>
    <!-- Connect to Supabase CDN and custom logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
  </body>
</html>
